[DEFAULT]
bantime = 3600
findtime = 600
maxretry = 3
backend = auto
usedns = no
logencoding = UTF-8
enabled = false
mode = normal
filter = %(__name__)s[mode=%(mode)s]

[sshd]
enabled = true
port = 12141
filter = sshd
logpath = /var/log/auth.log
maxretry = 3
bantime = 3600
findtime = 600
backend = systemd

[dropbear]
enabled = false
port = ssh
filter = dropbear
logpath = /var/log/auth.log
maxretry = 3

[selinux-ssh]
enabled = false
port = ssh
filter = selinux-ssh
logpath = /var/log/audit/audit.log
maxretry = 3

[apache-auth]
enabled = false
port = http,https
filter = apache-auth
logpath = /var/log/apache2/*error.log
maxretry = 3

[apache-badbots]
enabled = false
port = http,https
filter = apache-badbots
logpath = /var/log/apache2/*error.log
maxretry = 3

[nginx-http-auth]
enabled = false
port = http,https
filter = nginx-http-auth
logpath = /var/log/nginx/error.log
maxretry = 3

[docker-compose]
enabled = true
port = all
filter = docker-compose
logpath = /var/log/auth.log
maxretry = 5
