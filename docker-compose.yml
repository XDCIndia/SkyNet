# XDC SkyNet - Docker Compose Configuration
# Run with: docker-compose up -d

version: '3.8'

services:
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: skynet-dashboard
    ports:
      - "3005:3005"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://skynet:${DB_PASSWORD:-skynet}@postgres:5432/skynet
      - REDIS_URL=redis://redis:6379
      - API_KEYS=${API_KEYS:-dev_key_change_in_production}
      - WS_PORT=3006
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - skynet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  websocket:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: skynet-websocket
    command: ["node", "-r", "tsx/register", "ws-server.ts"]
    ports:
      - "3006:3006"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://skynet:${DB_PASSWORD:-skynet}@postgres:5432/skynet
      - WS_PORT=3006
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - skynet-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: skynet-postgres
    environment:
      - POSTGRES_USER=skynet
      - POSTGRES_PASSWORD=${DB_PASSWORD:-skynet}
      - POSTGRES_DB=skynet
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./dashboard/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - skynet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skynet -d skynet"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: skynet-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    ports:
      - "6379:6379"
    networks:
      - skynet-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: skynet-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - skynet-network
    profiles:
      - monitoring
    restart: unless-stopped

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: skynet-grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3001:3000"
    networks:
      - skynet-network
    profiles:
      - monitoring
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:

networks:
  skynet-network:
    driver: bridge
